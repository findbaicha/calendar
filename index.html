<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSE 学习历程日历</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --bg: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .calendar-container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h2 { margin: 0; color: var(--primary); }
        button {
            padding: 8px 15px;
            cursor: pointer;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            transition: 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            color: #7f8c8d;
            padding-bottom: 10px;
        }
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }
        .day {
            min-height: 100px;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            background: #fff;
        }
        .day:hover { background: #f9f9f9; border-color: var(--accent); }
        .day-num { font-weight: bold; margin-bottom: 5px; }
        .event {
            font-size: 0.75em;
            color: var(--accent);
            overflow-wrap: break-word;
            white-space: pre-wrap; /* 关键：识别换行符 */
            line-height: 1.4;
        }
        .empty { visibility: hidden; }
        #status {
            margin-top: 15px;
            font-size: 0.85em;
            color: #95a5a6;
        }
        .token-mgr { font-size: 0.7em; background: #95a5a6; margin-left: 5px; }
    </style>
</head>
<body>

<div class="calendar-container">
    <div class="header">
        <button id="prevBtn" onclick="changeMonth(-1)">上个月</button>
        <h2 id="monthDisplay">加载中...</h2>
        <div>
            <button id="nextBtn" onclick="changeMonth(1)">下个月</button>
            <button class="token-mgr" onclick="resetToken()">重置 Token</button>
        </div>
    </div>
    
    <div class="weekdays">
        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
    </div>
    
    <div class="days" id="calendarGrid"></div>
    <div id="status">初始化中...</div>
</div>

<script>
    // --- 配置区 ---
    const CONFIG = {
        owner: 'findbaicha',
        repo: 'calendar', 
        path: 'calender_data.json'
    };

    let curDate = new Date();
    let events = {};
    let currentSha = null;
    let loading = true;

    // --- 工具函数 ---
    const getStoredToken = () => localStorage.getItem('gh_token_temp');
    const updateStatus = (txt) => document.getElementById('status').innerText = txt;
    const utf8_to_b64 = (str) => btoa(unescape(encodeURIComponent(str)));
    const b64_to_utf8 = (str) => {
        try { return decodeURIComponent(escape(atob(str))); }
        catch(e) { return "{}"; }
    };

    function resetToken() {
        localStorage.removeItem('gh_token_temp');
        alert("Token 已清除，请刷新页面。");
        location.reload();
    }

    // --- 数据同步 ---
    async function fetchData() {
        let token = getStoredToken();
        if (!token) {
            token = prompt("请输入 GitHub Token (ghp_...):");
            if (token) localStorage.setItem('gh_token_temp', token.trim());
            else { updateStatus("无 Token 模式"); return; }
        }

        updateStatus("同步 GitHub 数据中...");
        const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`;
        
        try {
            const res = await fetch(url, {
                headers: { 'Authorization': `token ${token}`, 'Cache-Control': 'no-cache' }
            });

            if (res.ok) {
                const data = await res.json();
                currentSha = data.sha;
                events = JSON.parse(b64_to_utf8(data.content) || "{}");
                updateStatus("同步完成");
            } else if (res.status === 404) {
                updateStatus("新文件准备中...");
            } else {
                updateStatus(`加载失败 (${res.status})，建议检查 Token`);
            }
        } catch (e) {
            updateStatus("连接 GitHub 失败，请检查网络");
        }
        loading = false;
        render();
    }

    async function pushData() {
        const token = getStoredToken();
        if (!token) return;

        loading = true;
        updateStatus("正在推送至 GitHub...");

        const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`;
        
        try {
            // 保存前获取最新 SHA，避免 409 冲突
            const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}`, 'Cache-Control': 'no-cache' } });
            if (getRes.ok) {
                const getData = await getRes.json();
                currentSha = getData.sha;
            }

            const res = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Update calendar data",
                    content: utf8_to_b64(JSON.stringify(events, null, 2)),
                    sha: currentSha
                })
            });

            if (res.ok) {
                const resData = await res.json();
                currentSha = resData.content.sha;
                updateStatus("保存成功");
            } else {
                updateStatus("保存失败，请检查仓库权限");
            }
        } catch (e) {
            updateStatus("网络异常");
        }
        loading = false;
        render();
    }

    // --- 界面渲染 ---
    function render() {
        const year = curDate.getFullYear();
        const month = curDate.getMonth();
        document.getElementById('monthDisplay').innerText = `${year}年 ${month + 1}月`;

        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        // 空白日期
        for (let i = 0; i < firstDay; i++) {
            const div = document.createElement('div');
            div.className = 'day empty';
            grid.appendChild(div);
        }

        // 真实日期
        for (let d = 1; d <= daysInMonth; d++) {
            const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const div = document.createElement('div');
            div.className = 'day';
            div.innerHTML = `<div class="day-num">${d}</div>`;
            
            if (events[dateKey]) {
                const evDiv = document.createElement('div');
                evDiv.className = 'event';
                evDiv.innerText = events[dateKey];
                div.appendChild(evDiv);
            }

            div.onclick = () => {
                if (loading) return;
                const oldNote = events[dateKey] || "";
                const newNote = prompt(`${dateKey} 的新日程:\n(取消或为空则保持不变)`);
                
                if (newNote !== null) {
                    if (newNote.trim()) {
                        // 支持追加多行
                        events[dateKey] = oldNote ? (oldNote + "\n• " + newNote.trim()) : "• " + newNote.trim();
                        pushData();
                    } else if (newNote === "") {
                        if(confirm("要清空今天的全部日程吗？")) {
                            delete events[dateKey];
                            pushData();
                        }
                    }
                }
            };
            grid.appendChild(div);
        }
        document.getElementById('prevBtn').disabled = loading;
        document.getElementById('nextBtn').disabled = loading;
    }

    function changeMonth(delta) {
        curDate.setMonth(curDate.getMonth() + delta);
        render();
    }

    // 自动运行
    fetchData();
</script>

</body>
</html>
