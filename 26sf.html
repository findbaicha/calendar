<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云日历备忘 · GitHub Page</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f0f5fa;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .calendar-app {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,20,40,0.12);
            padding: 28px 24px;
        }
        /* 头部区域 */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .app-header h1 {
            margin: 0;
            font-weight: 500;
            font-size: 1.9rem;
            letter-spacing: -0.5px;
            color: #1a3b5d;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .app-header h1 span {
            background: #e1ecfe;
            padding: 4px 12px;
            font-size: 0.9rem;
            border-radius: 40px;
            color: #1e5f9e;
            font-weight: 400;
        }
        .month-nav {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #f2f7fd;
            padding: 8px 16px;
            border-radius: 48px;
        }
        .month-nav button {
            background: white;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 40px;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            transition: 0.15s;
            color: #1e5f9e;
            font-weight: 400;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #dde7f0;
        }
        .month-nav button:hover {
            background: #e1ecfe;
            border-color: #8bb4da;
        }
        .current-month {
            font-size: 1.5rem;
            font-weight: 500;
            min-width: 180px;
            text-align: center;
            color: #113355;
        }
        /* 日历网格 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 28px;
        }
        .weekday {
            text-align: center;
            font-weight: 500;
            color: #4d6278;
            padding: 8px 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .day-card {
            background: #f9fcff;
            border-radius: 18px;
            padding: 12px 8px 8px 8px;
            min-height: 110px;
            border: 1px solid #e6eef8;
            transition: 0.1s;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .day-card:hover {
            background: #ffffff;
            border-color: #b9d3f0;
            box-shadow: 0 6px 12px rgba(28,80,140,0.08);
        }
        .day-card.today {
            background: #e3f0ff;
            border-left: 5px solid #1e80e0;
        }
        .day-card.other-month {
            opacity: 0.45;
            background: #f2f5f9;
        }
        .day-number {
            font-weight: 500;
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: #1f3a57;
        }
        .memo-preview {
            font-size: 0.75rem;
            color: #1e5f9e;
            background: rgba(30, 95, 158, 0.08);
            padding: 4px 6px;
            border-radius: 20px;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        .memo-count {
            font-size: 0.7rem;
            color: #486581;
            margin-top: auto;
            text-align: right;
            padding-top: 4px;
        }
        /* 底部编辑区 */
        .memo-editor {
            background: #f2f8ff;
            border-radius: 28px;
            padding: 22px 24px;
            border: 1px solid #caddf0;
            margin-top: 10px;
        }
        .editor-title {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }
        .selected-date {
            background: #1a3b5d;
            color: white;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 1.2rem;
        }
        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .memo-input {
            flex: 3 1 260px;
            background: white;
            border: 1px solid #b6cde0;
            border-radius: 48px;
            padding: 14px 22px;
            font-size: 1rem;
            outline: none;
            transition: 0.15s;
        }
        .memo-input:focus {
            border-color: #1e80e0;
            box-shadow: 0 0 0 3px rgba(30,128,224,0.15);
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            background: white;
            border: 1px solid #a0bedb;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 500;
            color: #1c3d5e;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #1a3b5d;
            border-color: #1a3b5d;
            color: white;
            box-shadow: 0 4px 10px rgba(26,59,93,0.25);
        }
        .btn-primary:hover {
            background: #25527c;
        }
        .btn-danger {
            background: #ffe9e9;
            border-color: #f3bdbd;
            color: #a13030;
        }
        .btn-danger:hover {
            background: #ffd9d9;
        }
        .memo-list {
            margin-top: 20px;
            background: white;
            border-radius: 24px;
            padding: 18px;
            max-height: 160px;
            overflow-y: auto;
            border: 1px solid #dbe5f0;
        }
        .memo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px dashed #d4e0ec;
        }
        .memo-item:last-child {
            border-bottom: none;
        }
        .memo-text {
            font-size: 0.95rem;
            color: #153e60;
        }
        .delete-memo {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #9facc0;
            padding: 0 6px;
        }
        .delete-memo:hover {
            color: #c03939;
        }
        .status-note {
            color: #527a9f;
            font-size: 0.9rem;
            margin-left: 16px;
        }
        footer {
            margin-top: 18px;
            font-size: 0.8rem;
            color: #6b85a0;
            text-align: center;
            border-top: 1px dashed #c9daea;
            padding-top: 16px;
        }
    </style>
</head>
<body>
<div class="calendar-app">
    <div class="app-header">
        <h1>
            📅 云日历·备忘
            <span>⛅ IndexedDB</span>
        </h1>
        <div class="month-nav">
            <button id="prevMonthBtn">←</button>
            <span class="current-month" id="currentMonthDisplay">2025年3月</span>
            <button id="nextMonthBtn">→</button>
        </div>
    </div>

    <!-- 日历网格 7列 -->
    <div class="calendar-grid" id="calendarGrid">
        <!-- 星期由JS动态生成, 但为了方便可以先占位，JS会重绘 -->
    </div>

    <!-- 日程编辑面板 -->
    <div class="memo-editor" id="memoEditor">
        <div class="editor-title">
            <div class="selected-date" id="selectedDateDisplay">未选择日期</div>
            <div class="status-note" id="dbStatus">🌐 云数据库·已连接</div>
        </div>
        <div class="input-group">
            <input type="text" class="memo-input" id="memoInput" placeholder="写一条备忘... 例如: 14:00 团队会议" autocomplete="off">
            <div class="action-buttons">
                <button class="btn btn-primary" id="addMemoBtn">➕ 添加</button>
                <button class="btn" id="refreshBtn">🔄 刷新</button>
            </div>
        </div>
        <!-- 当前选中日期的备忘列表 -->
        <div class="memo-list" id="memoListContainer">
            <div style="color:#7b97b5; text-align:center; padding:10px;">← 点击 选择日期</div>
        </div>
        <div style="margin-top:12px; display:flex; gap:10px; justify-content:flex-end;">
            <button class="btn btn-danger" id="clearDayBtn">🗑️ 清空当天备忘</button>
        </div>
    </div>
    <footer>
        ⚡ 数据存储在您的浏览器 IndexedDB (云数据库体验) · 可部署于 GitHub Pages
    </footer>
</div>

<script>
    (function() {
        // ---------- 初始化数据库 (类似云数据库的本地存储) ----------
        const DB_NAME = 'CloudCalendarDB';
        const STORE_NAME = 'memos';
        const DB_VERSION = 1;

        let db = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                if (db && db.name === DB_NAME) {
                    resolve(db);
                    return;
                }
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = (ev) => {
                    console.error('数据库打开失败', ev);
                    document.getElementById('dbStatus').innerHTML = '⚠️ 数据库错误';
                    reject(ev);
                };
                request.onsuccess = (ev) => {
                    db = ev.target.result;
                    console.log('数据库打开成功', db);
                    document.getElementById('dbStatus').innerHTML = '☁️ 云数据库·在线';
                    resolve(db);
                };
                request.onupgradeneeded = (ev) => {
                    const db = ev.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        // 使用日期作为索引 (格式: YYYY-MM-DD)
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        store.createIndex('date', 'date', { unique: false });
                        store.createIndex('timestamp', 'timestamp', { unique: false });
                        console.log('数据库表结构创建');
                    }
                };
            });
        }

        // 辅助: 获取当前选中日期 (YYYY-MM-DD)
        function formatDateKey(year, month, day) {
            return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        // 从Date对象转为 YYYY-MM-DD
        function dateToKey(date) {
            const y = date.getFullYear();
            const m = date.getMonth() + 1;
            const d = date.getDate();
            return formatDateKey(y, m, d);
        }

        // 当前日历状态
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth(); // 0-11
        let selectedYear = currentYear;
        let selectedMonth = currentMonth;
        let selectedDay = new Date().getDate();    // 默认为今天

        // 今日年月日
        const today = new Date();
        const todayYear = today.getFullYear();
        const todayMonth = today.getMonth();
        const todayDay = today.getDate();

        // UI元素
        const monthDisplay = document.getElementById('currentMonthDisplay');
        const calendarGrid = document.getElementById('calendarGrid');
        const selectedDateDisplay = document.getElementById('selectedDateDisplay');
        const memoInput = document.getElementById('memoInput');
        const addMemoBtn = document.getElementById('addMemoBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const clearDayBtn = document.getElementById('clearDayBtn');
        const memoListContainer = document.getElementById('memoListContainer');
        const prevMonthBtn = document.getElementById('prevMonthBtn');
        const nextMonthBtn = document.getElementById('nextMonthBtn');

        // 初始化星期行
        function renderWeekdays() {
            const weekdays = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
            let html = '';
            weekdays.forEach(d => {
                html += `<div class="weekday">${d}</div>`;
            });
            // 在grid中插入星期（grid前7个）
            // 我们直接通过JS覆盖日历时保留第一行？
            // 简单处理：每次render日历都先清空并重新插入星期 + 日期卡片
        }

        // 获取某月天数
        function getDaysInMonth(year, month) {
            return new Date(year, month + 1, 0).getDate();
        }

        // 获取某月第一天是周几 (注意: 返回值 0=周日 ... 6=周六, 我们需要转成周一=0 ... 周日=6)
        function getFirstDayOfMonth(year, month) {
            let firstDay = new Date(year, month, 1).getDay(); // 0=周日,1=周一...
            // 转换：若firstDay=0(周日) 则为6, 周一为0, 周二1... 周六5
            return firstDay === 0 ? 6 : firstDay - 1;
        }

        // 渲染日历 + 读取所有备忘并显示小点
        async function renderCalendar() {
            await openDB(); // 确保db打开
            const year = currentYear;
            const month = currentMonth;

            const daysInMonth = getDaysInMonth(year, month);
            const firstDayIndex = getFirstDayOfMonth(year, month); // 周一=0

            // 获取上个月剩余天数
            const prevMonthDate = new Date(year, month, 0); // 上个月最后一天
            const prevMonthYear = prevMonthDate.getFullYear();
            const prevMonth = prevMonthDate.getMonth(); // 上个月索引
            const daysInPrevMonth = getDaysInMonth(prevMonthYear, prevMonth);

            // 准备所有卡片数据 (42个格子)
            let dayCards = [];
            // 前部填充 (上月)
            for (let i = 0; i < firstDayIndex; i++) {
                const day = daysInPrevMonth - firstDayIndex + i + 1;
                dayCards.push({
                    year: prevMonthYear,
                    month: prevMonth,
                    day: day,
                    isCurrentMonth: false
                });
            }
            // 本月
            for (let d = 1; d <= daysInMonth; d++) {
                dayCards.push({
                    year: year,
                    month: month,
                    day: d,
                    isCurrentMonth: true
                });
            }
            // 尾部填充 (下月) 凑满42个
            const nextMonthDate = new Date(year, month + 1, 1);
            const nextMonthYear = nextMonthDate.getFullYear();
            const nextMonth = nextMonthDate.getMonth();
            let nextDay = 1;
            while (dayCards.length < 42) {
                dayCards.push({
                    year: nextMonthYear,
                    month: nextMonth,
                    day: nextDay,
                    isCurrentMonth: false
                });
                nextDay++;
            }

            // 获取所有备忘数据，用以显示预览
            const allMemos = await getAllMemos();

            // 构建网格HTML (先清空)
            calendarGrid.innerHTML = '';
            // 插入星期
            const weekdays = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
            weekdays.forEach(w => {
                const wd = document.createElement('div');
                wd.className = 'weekday';
                wd.innerText = w;
                calendarGrid.appendChild(wd);
            });

            // 插入日期卡片
            for (let card of dayCards) {
                const cardDiv = document.createElement('div');
                cardDiv.className = `day-card ${card.isCurrentMonth ? '' : 'other-month'}`;

                // 高亮今天 (仅当月且年月日完全匹配)
                if (card.year === todayYear && card.month === todayMonth && card.day === todayDay && card.isCurrentMonth) {
                    cardDiv.classList.add('today');
                }

                // 添加日期数字
                const numberDiv = document.createElement('div');
                numberDiv.className = 'day-number';
                numberDiv.innerText = card.day;
                cardDiv.appendChild(numberDiv);

                // 查询此日期对应的备忘
                const dateKey = formatDateKey(card.year, card.month + 1, card.day); // month+1
                const memosForDay = allMemos.filter(m => m.date === dateKey);
                if (memosForDay.length > 0) {
                    // 显示第一条预览
                    const preview = document.createElement('div');
                    preview.className = 'memo-preview';
                    preview.innerText = memosForDay[0].text.length > 12 ? memosForDay[0].text.slice(0, 10) + '…' : memosForDay[0].text;
                    cardDiv.appendChild(preview);

                    const countBadge = document.createElement('div');
                    countBadge.className = 'memo-count';
                    countBadge.innerText = memosForDay.length > 1 ? `+${memosForDay.length-1}` : '';
                    cardDiv.appendChild(countBadge);
                }

                // 点击事件选择日期
                cardDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    // 更新选中日期
                    selectedYear = card.year;
                    selectedMonth = card.month;
                    selectedDay = card.day;
                    updateSelectedDateDisplay();
                    refreshMemoList(); // 展示备忘
                });

                calendarGrid.appendChild(cardDiv);
            }

            // 更新月份显示
            monthDisplay.innerText = `${year}年${month+1}月`;

            // 如果当前选中日期不在本月？可选重置选中但不强制
            if (selectedYear !== year || selectedMonth !== month) {
                // 但是保持选中可见
            }
            // 确保选中日期显示刷新生效
            updateSelectedDateDisplay();
        }

        // 更新选中的日期显示
        function updateSelectedDateDisplay() {
            const dateKey = formatDateKey(selectedYear, selectedMonth + 1, selectedDay);
            selectedDateDisplay.innerText = `📌 ${selectedYear}年${selectedMonth+1}月${selectedDay}日`;
        }

        // 从数据库获取所有备忘
        async function getAllMemos() {
            return new Promise((resolve, reject) => {
                if (!db) return reject('DB not open');
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result || []);
                request.onerror = (e) => reject(e);
            });
        }

        // 根据日期获取备忘
        async function getMemosByDate(dateKey) {
            const all = await getAllMemos();
            return all.filter(m => m.date === dateKey).sort((a,b) => (a.timestamp || 0) - (b.timestamp || 0));
        }

        // 刷新右侧备忘列表
        async function refreshMemoList() {
            await openDB();
            const dateKey = formatDateKey(selectedYear, selectedMonth + 1, selectedDay);
            const memos = await getMemosByDate(dateKey);
            if (memos.length === 0) {
                memoListContainer.innerHTML = '<div style="color:#8ba3c0; text-align:center; padding:10px;">📭 今日无备忘，添加一条吧</div>';
            } else {
                let html = '';
                memos.forEach(memo => {
                    html += `<div class="memo-item" data-memo-id="${memo.id}">
                        <span class="memo-text">📋 ${memo.text}</span>
                        <button class="delete-memo" data-id="${memo.id}">✕</button>
                    </div>`;
                });
                memoListContainer.innerHTML = html;
                // 绑定删除事件
                memoListContainer.querySelectorAll('.delete-memo').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const id = Number(btn.dataset.id);
                        await deleteMemoById(id);
                        await refreshMemoList();
                        renderCalendar(); // 刷新日历上的预览
                    });
                });
            }
        }

        // 删除单条备忘
        async function deleteMemoById(id) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const req = store.delete(id);
                req.onsuccess = () => resolve();
                req.onerror = (e) => reject(e);
            });
        }

        // 添加备忘
        async function addMemoForCurrentDay(text) {
            if (!text.trim()) return;
            await openDB();
            const dateKey = formatDateKey(selectedYear, selectedMonth + 1, selectedDay);
            const memo = {
                date: dateKey,
                text: text.trim(),
                timestamp: Date.now()
            };
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const req = store.add(memo);
                req.onsuccess = async () => {
                    await refreshMemoList();
                    renderCalendar(); // 更新日历预览
                    resolve();
                };
                req.onerror = (e) => reject(e);
            });
        }

        // 清空当天所有备忘
        async function clearCurrentDayMemos() {
            await openDB();
            const dateKey = formatDateKey(selectedYear, selectedMonth + 1, selectedDay);
            const memos = await getMemosByDate(dateKey);
            if (memos.length === 0) return;
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            for (let m of memos) {
                store.delete(m.id);
            }
            return new Promise((resolve, reject) => {
                tx.oncomplete = () => {
                    refreshMemoList();
                    renderCalendar();
                    resolve();
                };
                tx.onerror = (e) => reject(e);
            });
        }

        // 事件绑定
        addMemoBtn.addEventListener('click', async () => {
            await addMemoForCurrentDay(memoInput.value);
            memoInput.value = '';
        });

        refreshBtn.addEventListener('click', async () => {
            await renderCalendar();
            await refreshMemoList();
        });

        clearDayBtn.addEventListener('click', async () => {
            if (confirm('确定清空当天的所有备忘吗？')) {
                await clearCurrentDayMemos();
            }
        });

        prevMonthBtn.addEventListener('click', () => {
            if (currentMonth === 0) {
                currentMonth = 11;
                currentYear -= 1;
            } else {
                currentMonth -= 1;
            }
            renderCalendar();
        });

        nextMonthBtn.addEventListener('click', () => {
            if (currentMonth === 11) {
                currentMonth = 0;
                currentYear += 1;
            } else {
                currentMonth += 1;
            }
            renderCalendar();
        });

        // 初始化时选中今天
        (async function init() {
            await openDB();
            await renderCalendar();
            // 检查今天是否在当月，若不在则调整选中为当月1号
            if (currentYear === todayYear && currentMonth === todayMonth) {
                selectedYear = todayYear;
                selectedMonth = todayMonth;
                selectedDay = todayDay;
            } else {
                selectedYear = currentYear;
                selectedMonth = currentMonth;
                selectedDay = 1; // 默认当月第一天
            }
            updateSelectedDateDisplay();
            await refreshMemoList();
        })();

        // 回车添加
        memoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addMemoForCurrentDay(memoInput.value);
                memoInput.value = '';
            }
        });
    })();
</script>
</body>
</html>
